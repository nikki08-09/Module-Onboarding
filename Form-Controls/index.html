<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Product Pick Form</title>
    <meta name="description" content="T-shirt order form" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <header>
      <h1>Product Pick</h1>
    </header>

    <main>
      <form>
        <!-- Customer Details -->
        <fieldset>
          <legend>Your Details</legend>

          <p>
            <label for="name">Full Name</label><br />
            <input type="text" id="name" name="name" required />
          </p>

          <p>
            <label for="email">Email Address</label><br />
            <input type="email" id="email" name="email" required />
          </p>
        </fieldset>

        <!-- Colour Selection -->
        <fieldset>
          <legend>T-Shirt Colour</legend>

          <p>
            <input type="radio" id="red" name="colour" value="Red" required />
            <label for="red">Red</label>
          </p>

          <p>
            <input type="radio" id="blue" name="colour" value="Blue" />
            <label for="blue">Blue</label>
          </p>

          <p>
            <input type="radio" id="green" name="colour" value="Green" />
            <label for="green">Green</label>
          </p>
        </fieldset>

        <!-- Size Selection -->
        <fieldset>
          <legend>T-Shirt Size</legend>

          <p>
            <input type="radio" id="xs" name="size" value="XS" required />
            <label for="xs">XS</label>
          </p>

          <p>
            <input type="radio" id="s" name="size" value="S" />
            <label for="s">S</label>
          </p>

          <p>
            <input type="radio" id="m" name="size" value="M" />
            <label for="m">M</label>
          </p>

          <p>
            <input type="radio" id="l" name="size" value="L" />
            <label for="l">L</label>
          </p>

          <p>
            <input type="radio" id="xl" name="size" value="XL" />
            <label for="xl">XL</label>
          </p>

          <p>
            <input type="radio" id="xxl" name="size" value="XXL" />
            <label for="xxl">XXL</label>
          </p>
        </fieldset>

        <p>
          <button type="submit">Submit Order</button>
        </p>
      </form>
    </main>

    <footer>
      <h2>2026 Nikita Sharma</h2>
    </footer>
  </body>
</html>
