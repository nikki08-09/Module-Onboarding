<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Data Form</title>
    <meta name="description" content="T-shirt order form" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <header>
      <h1>Product Data</h1>
    </header>

    <main>
      <form>
        <fieldset>
          <legend>Your Details</legend>
          <p>
            <label for="name">Full Name</lable><br />
            <input type="text" id="name"  name="name" required />
          </p>

          <p>
            <label for="email">Email</lable><br />
            <input
              type="email"
              id="email"
              name="email"
              required
            />
          </p>
        </fieldset>

        <fieldset>
          <legend>T-Shirt Colour</legend>
          <p>
            <input type="radio" id="red" name="colour" value="red" required />
            <label for="red">Red</label>
          </p>

          <p>
            <input type="radio" id="blue" name="colour" value="blue" />
            <label for="blue">Blue</lable>
          </p>

          <p>
            <input type="radio" id="green" name="colour" value="green" />
            <label for="green">Green</lable>
          </p>
        </fieldset>

        <fieldset>
          <legend>T-Shirt Sizes</legend>
          <p>
            <input type="radio" id="xs" name="size" value="xs" required />
            <label for="xs">XS</lable>
          </p>

          <p>
            <input type="radio" id="s" name="size" value="s" />
            <label for="s">S</lable>
          </p>

          <p>
            <input type="radio" id="m" name="size" value="m" />
            <label for="m">M</lable>
          </p>

          <p>
            <input type="radio" id="l" name="size" value="l" />
            <label for="l">L</lable>
          </p>

          <p>
            <input type="radio" id="xl" name="size" value="xl" />
            <label for="xl">XL</lable>
          </p>

          <p>
            <input type="radio" id="xxl" name="size" value="xxl" />
            <label for="xxl">XXL</lable>
          </p>
        </fieldset>

        <p>
          <button type="submit">Submit Order</button>
        </p>
      </form>
    </main>

    <footer>
      <h2>2026 Nikita Sharma</h2>
    </footer>
  </body>
</html>
