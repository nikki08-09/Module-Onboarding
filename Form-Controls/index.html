<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Data Form</title>
    <meta name="description" content="T-shirt order form">
  </head>
  <body>
    <header>
      <h1>Product Data</h1>
    </header>

    <main>
      <form>
        <fieldset>
          <legend>Your Details</legend>
          <div>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" minlength="2" required>
          </div>

          <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>
        </fieldset>

        <fieldset>
          <legend>T-Shirt Colour</legend>
          <div>
            <input type="radio" id="red" name="colour" value="red" required>
            <label for="red">Red</label>
          </div>

          <div>
            <input type="radio" id="blue" name="colour" value="blue">
            <label for="blue">Blue</label>
          </div>

          <div>
            <input type="radio" id="green" name="colour" value="green">
            <label for="green">Green</label>
          </div>
        </fieldset>

        <fieldset>
          <legend>T-Shirt Size</legend>
          <select id="size" name="size" required>
            <option value="" disabled selected>Select a size</option>
            <option value="xs">XS</option>
            <option value="s">S</option>
            <option value="m">M</option>
            <option value="l">L</option>
            <option value="xl">XL</option>
            <option value="xxl">XXL</option>
          </select>
        </fieldset>

        <div>
          <button type="submit">Submit Order</button>
        </div>
      </form>
    </main>

    <footer>
      <p>2026 Nikita Sharma</p>
    </footer>
  </body>
</html>
